<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minicode 2</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  </head>
  <body>
    <div class="container">
      <div class="buttons">
        <div class="buttons-container">
          <div class="buttons-left">
            <button id="html"><i class='bx bxl-html5'></i><span>html</span></button>
            <button id="css"><i class='bx bxl-css3'></i><span>css</span></button>
            <button id="js"><i class='bx bxl-javascript'></i><span>js</span></button>        
          </div>
          <div class="buttons-right">
            <button id="toggle-darkMode"></button>
          </div>
        </div>
      </div>
      <div id="editor-container">
        <div id="editor"></div>
      </div>
      <div id="preview">
        <iframe></iframe>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/gh/anthemaker/fusilli.js/fusilli.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/split.js/1.6.0/split.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.12.3/src-noconflict/ace.js" type="text/javascript" charset="utf-8"></script>
    <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.12.3/src-noconflict/ext-emmet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/emmet-core@1.0.0/emmet.js"></script>
    <script type="module" src="/main.js"></script>
  </body>
</html>
